<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="Nex.png">
<title>Nexxto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--c:#00f0ff;--p:#a855f7;--g:#00ff88}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Exo 2',sans-serif;-webkit-font-smoothing:antialiased}

canvas{position:fixed;inset:0;z-index:0;display:block}

.page{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100dvh;min-height:-webkit-fill-available;
  padding:max(env(safe-area-inset-top),1rem) max(env(safe-area-inset-right),1.5rem) max(env(safe-area-inset-bottom),1rem) max(env(safe-area-inset-left),1.5rem);
  gap:clamp(1.8rem,5vh,3.2rem);
}

.orb{
  position:absolute;
  width:clamp(320px,65vw,600px);height:clamp(320px,65vw,600px);
  border-radius:50%;
  background:radial-gradient(ellipse,rgba(0,240,255,0.055) 0%,rgba(168,85,247,0.03) 40%,transparent 68%);
  pointer-events:none;
  animation:orbFloat 6s ease-in-out infinite;
}
@keyframes orbFloat{0%,100%{transform:scale(1) translateY(0);opacity:.7}50%{transform:scale(1.1) translateY(-8px);opacity:1}}

.rings{
  position:absolute;
  width:clamp(260px,50vw,480px);height:clamp(260px,50vw,480px);
  border-radius:50%;
  border:1px solid rgba(0,240,255,0.06);
  pointer-events:none;
  animation:ringPulse 4s ease-in-out infinite;
}
.rings::before{
  content:'';position:absolute;inset:-24px;border-radius:50%;
  border:1px solid rgba(168,85,247,0.05);
  animation:ringPulse 4s 1s ease-in-out infinite;
}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.05);opacity:1}}

.logo-area{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(0.9rem,2.5vh,1.5rem);
  animation:fadeDown .9s cubic-bezier(.22,1,.36,1) both;
}

.logo-wrap{
  position:relative;
  display:inline-flex;align-items:center;justify-content:center;
  padding:clamp(14px,3vw,26px);
  border-radius:22px;
  background:rgba(0,240,255,0.03);
  border:1px solid rgba(0,240,255,0.1);
  animation:logoGlowPulse 3.5s ease-in-out infinite;
}
@keyframes logoGlowPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,240,255,0),inset 0 0 0 0 rgba(0,240,255,0)}
  50%{box-shadow:0 0 40px rgba(0,240,255,0.1),inset 0 0 20px rgba(0,240,255,0.04)}
}

.logo-wrap::before,.logo-wrap::after,
.logo-wrap .c1,.logo-wrap .c2{
  content:'';position:absolute;
  border-color:rgba(0,240,255,0.7);border-style:solid;
  transition:all .4s cubic-bezier(.22,1,.36,1);
}
.logo-wrap::before{top:-1px;left:-1px;width:16px;height:16px;border-width:2px 0 0 2px;border-radius:4px 0 0 0}
.logo-wrap::after{top:-1px;right:-1px;width:16px;height:16px;border-width:2px 2px 0 0;border-radius:0 4px 0 0}
.logo-wrap .c1{bottom:-1px;left:-1px;width:16px;height:16px;border-width:0 0 2px 2px;border-radius:0 0 0 4px}
.logo-wrap .c2{bottom:-1px;right:-1px;width:16px;height:16px;border-width:0 2px 2px 0;border-radius:0 0 4px 0}
.logo-wrap:hover::before,.logo-wrap:hover::after,.logo-wrap:hover .c1,.logo-wrap:hover .c2{width:24px;height:24px}

.logo-wrap img{
  display:block;
  width:clamp(90px,20vw,180px);height:auto;
  filter:drop-shadow(0 0 20px rgba(0,240,255,0.6)) drop-shadow(0 0 44px rgba(0,240,255,0.22));
  animation:imgFloat 4s ease-in-out infinite;
}
@keyframes imgFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

.logo-fallback{
  display:none;
  width:clamp(90px,20vw,180px);height:clamp(90px,20vw,180px);
  align-items:center;justify-content:center;
}

.title-block{display:flex;flex-direction:column;align-items:center;gap:0.35rem;text-align:center}

.title-main{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1.05rem,4vw,1.75rem);
  font-weight:900;
  letter-spacing:clamp(0.1em,1.5vw,0.25em);
  color:#fff;
  text-shadow:0 0 30px rgba(0,240,255,0.5),0 0 60px rgba(0,240,255,0.18);
  animation:textShimmer 4s ease-in-out infinite;
}
@keyframes textShimmer{
  0%,100%{text-shadow:0 0 30px rgba(0,240,255,0.5),0 0 60px rgba(0,240,255,0.18)}
  50%{text-shadow:0 0 40px rgba(0,240,255,0.75),0 0 80px rgba(0,240,255,0.3),0 0 120px rgba(0,240,255,0.1)}
}

.divider{
  width:clamp(36px,7vw,56px);height:1px;
  background:linear-gradient(90deg,transparent,var(--c),transparent);
  margin:0.2rem 0;
  position:relative;overflow:hidden;
}
.divider::after{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.8),transparent);
  animation:divSlide 3s ease-in-out infinite;
}
@keyframes divSlide{0%,100%{left:-100%}50%{left:100%}}

.title-sub{
  font-size:clamp(0.58rem,1.8vw,0.72rem);
  font-weight:300;letter-spacing:clamp(0.12em,1.5vw,0.28em);
  color:rgba(0,240,255,0.45);text-transform:uppercase;
}

.btn-group{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(0.65rem,2vh,0.95rem);
  width:100%;max-width:clamp(240px,80vw,310px);
  animation:fadeUp .9s .22s cubic-bezier(.22,1,.36,1) both;
}

.btn{
  position:relative;
  display:flex;align-items:center;justify-content:center;gap:0.55rem;
  width:100%;
  padding:clamp(0.72rem,2.5vh,0.92rem) 1.5rem;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(0,240,255,0.15);
  border-radius:9px;
  color:rgba(200,240,255,0.8);
  font-family:'Orbitron',sans-serif;
  font-size:clamp(0.6rem,1.8vw,0.7rem);
  font-weight:700;letter-spacing:0.14em;
  text-decoration:none;text-transform:uppercase;
  cursor:pointer;overflow:hidden;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:color .25s,border-color .25s,box-shadow .25s,transform .2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 30%,rgba(0,240,255,0.1) 50%,transparent 70%);
  transform:translateX(-120%);transition:transform .65s ease;
}
.btn:hover::before{transform:translateX(120%)}
.btn:hover,.btn:focus-visible{
  border-color:rgba(0,240,255,0.6);color:var(--c);
  box-shadow:0 0 28px rgba(0,240,255,0.2),0 0 60px rgba(0,240,255,0.06),inset 0 0 16px rgba(0,240,255,0.05);
  transform:translateY(-2px);outline:none;
}
.btn:active{transform:translateY(0) scale(.97) !important}
.btn.discord{border-color:rgba(88,101,242,0.22)}
.btn.discord:hover,.btn.discord:focus-visible{
  border-color:rgba(88,101,242,0.7);color:#b0b8ff;
  box-shadow:0 0 28px rgba(88,101,242,0.22),inset 0 0 16px rgba(88,101,242,0.05);
}
.btn svg{flex-shrink:0;width:clamp(12px,1.8vw,15px);height:clamp(12px,1.8vw,15px)}

.stats-row{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:clamp(0.6rem,2vw,1rem);
  animation:fadeUp .9s .1s cubic-bezier(.22,1,.36,1) both;
}
.stat-badge{
  display:flex;align-items:center;gap:0.4rem;
  padding:0.38rem 0.85rem;
  background:rgba(0,0,0,0.45);
  border:1px solid rgba(0,240,255,0.12);
  border-radius:20px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  font-size:clamp(0.6rem,1.6vw,0.7rem);
  font-family:'Orbitron',sans-serif;
  letter-spacing:0.06em;
  color:rgba(200,234,238,0.65);
  white-space:nowrap;
}
.stat-badge .dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  animation:dotPulse 2s ease-in-out infinite;
}
.stat-badge.discord-stat .dot{background:#5865F2;box-shadow:0 0 6px rgba(88,101,242,0.8)}
.stat-badge.exec-stat .dot{background:var(--g);box-shadow:0 0 6px rgba(0,255,136,0.8)}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}
.stat-num{color:#fff;font-weight:700}

@keyframes fadeDown{from{opacity:0;transform:translateY(-28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

@media(hover:none) and (pointer:coarse){
  .btn:hover{transform:none;border-color:rgba(0,240,255,0.15);color:rgba(200,240,255,0.8);box-shadow:none}
  .btn.discord:hover{border-color:rgba(88,101,242,0.22);color:rgba(200,240,255,0.8);box-shadow:none}
  .btn:active{border-color:rgba(0,240,255,0.6) !important;color:var(--c) !important;transform:scale(.97) !important}
  .btn.discord:active{border-color:rgba(88,101,242,0.7) !important;color:#b0b8ff !important}
}
@media(max-width:320px){.title-main{letter-spacing:0.08em}.title-sub{letter-spacing:0.15em}.btn{letter-spacing:0.08em}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="page">
  <div class="orb"></div>
  <div class="rings"></div>

  <div class="logo-area">
    <div class="logo-wrap">
      <div class="c1"></div><div class="c2"></div>
      <img src="Nex.png" alt="Nexxto" id="logoImg"
        onerror="this.style.display='none';document.getElementById('lf').style.display='flex'">
      <div class="logo-fallback" id="lf">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#00f0ff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/>
          <line x1="12" y1="2" x2="12" y2="22"/>
          <line x1="2" y1="8.5" x2="22" y2="8.5"/>
          <line x1="2" y1="15.5" x2="22" y2="15.5"/>
        </svg>
      </div>
    </div>
    <div class="title-block">
      <div class="title-main">Nexxto</div>
      <div class="divider"></div>
      <div class="title-sub">Number 1 Script on Roblox</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-badge discord-stat">
      <div class="dot"></div>
      <span><span class="stat-num" id="memberCount">—</span> Members</span>
    </div>
    <div class="stat-badge exec-stat">
      <div class="dot"></div>
      <span><span class="stat-num" id="execCount">—</span> Executes</span>
    </div>
  </div>

  <div class="btn-group">
    <a href="main.html" class="btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      Continue
    </a>
    <a href="https://discord.gg/GtbrFrcU5z" target="_blank" rel="noopener noreferrer" class="btn discord">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>
      Join Discord
    </a>
  </div>
</div>

<script>
(function(){
  var EXEC_KEY='nexxto_exec_count';
  function getExecCount(){
    try{return parseInt(localStorage.getItem(EXEC_KEY)||'0',10);}catch(e){return 0;}
  }
  function setExecCount(n){
    try{localStorage.setItem(EXEC_KEY,n);}catch(e){}
  }
  function updateExecDisplay(){
    var el=document.getElementById('execCount');
    if(el)el.textContent=getExecCount().toLocaleString();
  }
  updateExecDisplay();
  window.incrementExec=function(){setExecCount(getExecCount()+1);updateExecDisplay();};

  function fetchDiscord(){
    fetch('https://discord.com/api/v10/guilds/1503342956080267394/widget.json')
      .then(function(r){return r.json();})
      .then(function(d){
        var el=document.getElementById('memberCount');
        if(el&&d.presence_count!==undefined)el.textContent=d.presence_count.toLocaleString();
      })
      .catch(function(){
        var el=document.getElementById('memberCount');
        if(el)el.textContent='N/A';
      });
  }
  fetchDiscord();
  setInterval(fetchDiscord,30000);
})();

(function(){
  var cv=document.getElementById('c'),cx=cv.getContext('2d');
  var W,H,pts=[];
  var dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    cv.width=W*dpr;cv.height=H*dpr;
    cv.style.width=W+'px';cv.style.height=H+'px';
    cx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();window.addEventListener('resize',resize);
  function Pt(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-.5)*.3;this.vy=(Math.random()-.5)*.18;
    this.r=Math.random()*1.7+.3;this.a=Math.random()*.5+.1;
    this.t=Math.random()*Math.PI*2;this.col=Math.floor(Math.random()*3);
  }
  for(var i=0;i<55;i++)pts.push(new Pt());
  var COLS=['#00f0ff','#a855f7','#00ff88'];
  var scanT=0;
  function frame(){
    cx.clearRect(0,0,W,H);scanT+=.0025;
    cx.strokeStyle='rgba(0,240,255,0.028)';cx.lineWidth=.7;
    for(var x=0;x<W;x+=52){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(var y=0;y<H;y+=52){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    var sy=(scanT%1)*H;
    var sg=cx.createLinearGradient(0,sy-80,0,sy+80);
    sg.addColorStop(0,'rgba(0,240,255,0)');sg.addColorStop(.5,'rgba(0,240,255,0.025)');sg.addColorStop(1,'rgba(0,240,255,0)');
    cx.fillStyle=sg;cx.fillRect(0,sy-80,W,160);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      p.x+=p.vx;p.y+=p.vy;p.t+=.016;
      if(p.x<-5)p.x=W+5;if(p.x>W+5)p.x=-5;
      if(p.y<-5)p.y=H+5;if(p.y>H+5)p.y=-5;
      for(var j=i+1;j<pts.length;j++){
        var q=pts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<108){cx.globalAlpha=(1-d/108)*.09;cx.strokeStyle='#00f0ff';cx.lineWidth=.4;cx.beginPath();cx.moveTo(p.x,p.y);cx.lineTo(q.x,q.y);cx.stroke();}
      }
      var pulse=.5+.5*Math.sin(p.t);
      cx.globalAlpha=p.a*pulse;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=COLS[p.col];cx.fill();
    }
    cx.globalAlpha=1;requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
