<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="Nex.png">
<title>Protected — Nexxto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--c:#00f0ff;--p:#a855f7;--g:#00ff88}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Exo 2',sans-serif;-webkit-font-smoothing:antialiased}

canvas{position:fixed;inset:0;z-index:0;display:block}

.page{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100dvh;min-height:-webkit-fill-available;
  padding:max(env(safe-area-inset-top),1rem) max(env(safe-area-inset-right),1.5rem) max(env(safe-area-inset-bottom),1rem) max(env(safe-area-inset-left),1.5rem);
  gap:clamp(1.4rem,4vh,2.4rem);
}

.orb{
  position:absolute;
  width:clamp(300px,60vw,560px);height:clamp(300px,60vw,560px);
  border-radius:50%;
  background:radial-gradient(ellipse,rgba(0,240,255,0.05) 0%,rgba(168,85,247,0.03) 40%,transparent 68%);
  pointer-events:none;
  animation:orbFloat 6s ease-in-out infinite;
}
@keyframes orbFloat{0%,100%{transform:scale(1) translateY(0);opacity:.7}50%{transform:scale(1.1) translateY(-8px);opacity:1}}

.rings{
  position:absolute;
  width:clamp(240px,48vw,460px);height:clamp(240px,48vw,460px);
  border-radius:50%;border:1px solid rgba(0,240,255,0.06);pointer-events:none;
  animation:ringPulse 4s ease-in-out infinite;
}
.rings::before{
  content:'';position:absolute;inset:-24px;border-radius:50%;
  border:1px solid rgba(168,85,247,0.05);
  animation:ringPulse 4s 1s ease-in-out infinite;
}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.05);opacity:1}}

.lock-wrap{
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:center;
  width:clamp(44px,8vw,54px);height:clamp(44px,8vw,54px);
  background:rgba(0,240,255,0.05);
  border:1px solid rgba(0,240,255,0.2);
  border-radius:12px;
  animation:fadeDown .65s cubic-bezier(.22,1,.36,1) both;
}
.lock-wrap::before,.lock-wrap::after,
.lock-wrap .lc1,.lock-wrap .lc2{
  content:'';position:absolute;
  border-color:rgba(0,240,255,0.5);border-style:solid;
}
.lock-wrap::before{top:-1px;left:-1px;width:10px;height:10px;border-width:1.5px 0 0 1.5px;border-radius:3px 0 0 0}
.lock-wrap::after{top:-1px;right:-1px;width:10px;height:10px;border-width:1.5px 1.5px 0 0;border-radius:0 3px 0 0}
.lock-wrap .lc1{bottom:-1px;left:-1px;width:10px;height:10px;border-width:0 0 1.5px 1.5px;border-radius:0 0 0 3px}
.lock-wrap .lc2{bottom:-1px;right:-1px;width:10px;height:10px;border-width:0 1.5px 1.5px 0;border-radius:0 0 3px 0}
.lock-wrap svg{width:clamp(20px,3.5vw,24px);height:clamp(20px,3.5vw,24px)}

.logo-area{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(0.85rem,2.5vh,1.4rem);
  animation:fadeDown .9s .08s cubic-bezier(.22,1,.36,1) both;
}

.logo-wrap{
  position:relative;
  display:inline-flex;align-items:center;justify-content:center;
  padding:clamp(14px,3vw,24px);
  border-radius:22px;
  background:rgba(0,240,255,0.03);
  border:1px solid rgba(0,240,255,0.1);
  animation:logoGlowPulse 3.5s ease-in-out infinite;
}
@keyframes logoGlowPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,240,255,0)}
  50%{box-shadow:0 0 40px rgba(0,240,255,0.1),inset 0 0 20px rgba(0,240,255,0.04)}
}
.logo-wrap::before,.logo-wrap::after,
.logo-wrap .c1,.logo-wrap .c2{
  content:'';position:absolute;
  border-color:rgba(0,240,255,0.65);border-style:solid;
}
.logo-wrap::before{top:-1px;left:-1px;width:15px;height:15px;border-width:2px 0 0 2px;border-radius:4px 0 0 0}
.logo-wrap::after{top:-1px;right:-1px;width:15px;height:15px;border-width:2px 2px 0 0;border-radius:0 4px 0 0}
.logo-wrap .c1{bottom:-1px;left:-1px;width:15px;height:15px;border-width:0 0 2px 2px;border-radius:0 0 0 4px}
.logo-wrap .c2{bottom:-1px;right:-1px;width:15px;height:15px;border-width:0 2px 2px 0;border-radius:0 0 4px 0}

.logo-wrap img{
  display:block;
  width:clamp(88px,19vw,170px);height:auto;
  filter:drop-shadow(0 0 20px rgba(0,240,255,0.6)) drop-shadow(0 0 44px rgba(0,240,255,0.22));
  animation:imgFloat 4s ease-in-out infinite;
}
@keyframes imgFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

.logo-fallback{
  display:none;
  width:clamp(88px,19vw,170px);height:clamp(88px,19vw,170px);
  align-items:center;justify-content:center;
}

.title-block{display:flex;flex-direction:column;align-items:center;gap:0.35rem;text-align:center}

.title-main{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1rem,3.8vw,1.65rem);
  font-weight:900;letter-spacing:clamp(0.1em,1.5vw,0.24em);
  color:#fff;
  text-shadow:0 0 30px rgba(0,240,255,0.5),0 0 60px rgba(0,240,255,0.18);
  animation:textShimmer 4s ease-in-out infinite;
}
@keyframes textShimmer{
  0%,100%{text-shadow:0 0 30px rgba(0,240,255,0.5),0 0 60px rgba(0,240,255,0.18)}
  50%{text-shadow:0 0 40px rgba(0,240,255,0.75),0 0 80px rgba(0,240,255,0.3)}
}

.divider{
  width:clamp(36px,7vw,52px);height:1px;
  background:linear-gradient(90deg,transparent,var(--c),transparent);
  margin:0.2rem 0;position:relative;overflow:hidden;
}
.divider::after{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.8),transparent);
  animation:divSlide 3s ease-in-out infinite;
}
@keyframes divSlide{0%,100%{left:-100%}50%{left:100%}}

.quote-box{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:0.6rem;
  padding:clamp(0.65rem,2vh,0.9rem) clamp(1rem,3vw,1.4rem);
  background:rgba(0,240,255,0.03);
  border:1px solid rgba(0,240,255,0.13);
  border-radius:10px;
  max-width:clamp(280px,80vw,440px);
  animation:fadeUp .9s .18s cubic-bezier(.22,1,.36,1) both;
}
.quote-box::before,.quote-box::after,
.quote-box .qc1,.quote-box .qc2{
  content:'';position:absolute;
  border-color:rgba(0,240,255,0.38);border-style:solid;
}
.quote-box::before{top:-1px;left:-1px;width:10px;height:10px;border-width:1.5px 0 0 1.5px;border-radius:3px 0 0 0}
.quote-box::after{top:-1px;right:-1px;width:10px;height:10px;border-width:1.5px 1.5px 0 0;border-radius:0 3px 0 0}
.quote-box .qc1{bottom:-1px;left:-1px;width:10px;height:10px;border-width:0 0 1.5px 1.5px;border-radius:0 0 0 3px}
.quote-box .qc2{bottom:-1px;right:-1px;width:10px;height:10px;border-width:0 1.5px 1.5px 0;border-radius:0 0 3px 0}

.quote-icon{flex-shrink:0;display:flex;align-items:center;opacity:.65}
.quote-icon svg{width:clamp(14px,2.5vw,17px);height:clamp(14px,2.5vw,17px)}

.quote-text{
  font-size:clamp(0.75rem,2.2vw,0.88rem);
  font-weight:400;color:rgba(200,234,238,0.7);
  letter-spacing:0.02em;line-height:1.5;font-style:italic;
}

.btn-wrap{
  position:relative;z-index:1;
  width:100%;max-width:clamp(240px,80vw,300px);
  animation:fadeUp .9s .28s cubic-bezier(.22,1,.36,1) both;
}

.btn{
  position:relative;
  display:flex;align-items:center;justify-content:center;gap:0.55rem;
  width:100%;
  padding:clamp(0.72rem,2.5vh,0.9rem) 1.5rem;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(0,240,255,0.15);
  border-radius:9px;
  color:rgba(200,240,255,0.8);
  font-family:'Orbitron',sans-serif;
  font-size:clamp(0.6rem,1.8vw,0.7rem);
  font-weight:700;letter-spacing:0.14em;
  text-decoration:none;text-transform:uppercase;
  cursor:pointer;overflow:hidden;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:color .25s,border-color .25s,box-shadow .25s,transform .2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 30%,rgba(0,240,255,0.1) 50%,transparent 70%);
  transform:translateX(-120%);transition:transform .65s ease;
}
.btn:hover::before{transform:translateX(120%)}
.btn:hover,.btn:focus-visible{
  border-color:rgba(0,240,255,0.6);color:var(--c);
  box-shadow:0 0 28px rgba(0,240,255,0.2),inset 0 0 16px rgba(0,240,255,0.05);
  transform:translateY(-2px);outline:none;
}
.btn:active{transform:translateY(0) scale(.97) !important}
.btn svg{flex-shrink:0;width:clamp(12px,1.8vw,15px);height:clamp(12px,1.8vw,15px)}

@keyframes fadeDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

@media(hover:none) and (pointer:coarse){
  .btn:hover{transform:none;border-color:rgba(0,240,255,0.15);color:rgba(200,240,255,0.8);box-shadow:none}
  .btn:active{border-color:rgba(0,240,255,0.6) !important;color:var(--c) !important;transform:scale(.97) !important}
}
@media(max-width:320px){.title-main{letter-spacing:0.08em}.btn{letter-spacing:0.08em}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="page">
  <div class="orb"></div>
  <div class="rings"></div>

  <div class="lock-wrap">
    <div class="lc1"></div><div class="lc2"></div>
    <svg viewBox="0 0 24 24" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <div class="logo-area">
    <div class="logo-wrap">
      <div class="c1"></div><div class="c2"></div>
      <img src="Nex.png" alt="Nexxto" id="logoImg"
        onerror="this.style.display='none';document.getElementById('lf').style.display='flex'">
      <div class="logo-fallback" id="lf">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#00f0ff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/>
          <line x1="12" y1="2" x2="12" y2="22"/>
          <line x1="2" y1="8.5" x2="22" y2="8.5"/>
          <line x1="2" y1="15.5" x2="22" y2="15.5"/>
        </svg>
      </div>
    </div>
    <div class="title-block">
      <div class="title-main">Nexxto</div>
      <div class="divider"></div>
    </div>
  </div>

  <div class="quote-box">
    <div class="qc1"></div><div class="qc2"></div>
    <div class="quote-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <span class="quote-text">This script is protected by Nexxto!</span>
  </div>

  <div class="btn-wrap">
    <a href="https://nexxto.vercel.app/" class="btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Go to Main Page
    </a>
  </div>
</div>

<script>
(function(){
  var cv=document.getElementById('c'),cx=cv.getContext('2d');
  var W,H,pts=[];
  var dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    cv.width=W*dpr;cv.height=H*dpr;
    cv.style.width=W+'px';cv.style.height=H+'px';
    cx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();window.addEventListener('resize',resize);
  function Pt(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-.5)*.3;this.vy=(Math.random()-.5)*.18;
    this.r=Math.random()*1.7+.3;this.a=Math.random()*.5+.1;
    this.t=Math.random()*Math.PI*2;this.col=Math.floor(Math.random()*3);
  }
  for(var i=0;i<55;i++)pts.push(new Pt());
  var COLS=['#00f0ff','#a855f7','#00ff88'],scanT=0;
  function frame(){
    cx.clearRect(0,0,W,H);scanT+=.0025;
    cx.strokeStyle='rgba(0,240,255,0.028)';cx.lineWidth=.7;
    for(var x=0;x<W;x+=52){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(var y=0;y<H;y+=52){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    var sy=(scanT%1)*H;
    var sg=cx.createLinearGradient(0,sy-80,0,sy+80);
    sg.addColorStop(0,'rgba(0,240,255,0)');sg.addColorStop(.5,'rgba(0,240,255,0.025)');sg.addColorStop(1,'rgba(0,240,255,0)');
    cx.fillStyle=sg;cx.fillRect(0,sy-80,W,160);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      p.x+=p.vx;p.y+=p.vy;p.t+=.016;
      if(p.x<-5)p.x=W+5;if(p.x>W+5)p.x=-5;
      if(p.y<-5)p.y=H+5;if(p.y>H+5)p.y=-5;
      for(var j=i+1;j<pts.length;j++){
        var q=pts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<108){cx.globalAlpha=(1-d/108)*.09;cx.strokeStyle='#00f0ff';cx.lineWidth=.4;cx.beginPath();cx.moveTo(p.x,p.y);cx.lineTo(q.x,q.y);cx.stroke();}
      }
      var pulse=.5+.5*Math.sin(p.t);
      cx.globalAlpha=p.a*pulse;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=COLS[p.col];cx.fill();
    }
    cx.globalAlpha=1;requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
