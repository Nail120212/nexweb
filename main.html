<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="Nex.png">
<title>Nexxto — Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c:#00f0ff;--p:#a855f7;--g:#00ff88;
  --bg:#000;--card:#080808;--card2:#0c0c0c;
  --b:rgba(0,240,255,0.11);--bh:rgba(0,240,255,0.38);
  --text:#c8eaee;--muted:rgba(200,234,238,0.36);
}
html{scroll-behavior:smooth}
body{
  min-height:100%;min-height:-webkit-fill-available;
  background:var(--bg);color:var(--text);
  font-family:'Exo 2',sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;display:block}

header{
  position:sticky;top:0;z-index:100;
  height:clamp(52px,8vh,64px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(0.9rem,3vw,1.6rem);
  padding-top:env(safe-area-inset-top,0);
  background:rgba(0,0,0,0.82);
  border-bottom:1px solid var(--b);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
}
.h-left{display:flex;align-items:center;gap:clamp(0.5rem,2vw,0.85rem)}

.menu-btn{
  background:transparent;border:1px solid var(--b);border-radius:7px;
  width:36px;height:36px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  cursor:pointer;flex-shrink:0;
  transition:border-color .2s,background .2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.menu-btn:hover{border-color:var(--c);background:rgba(0,240,255,0.04)}
.menu-btn span{display:block;width:15px;height:1.5px;background:var(--c);border-radius:2px;transition:transform .3s,opacity .3s}
.menu-btn.open span:nth-child(1){transform:translateY(5.5px) rotate(45deg)}
.menu-btn.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.menu-btn.open span:nth-child(3){transform:translateY(-5.5px) rotate(-45deg)}

.h-logo{display:flex;align-items:center;gap:clamp(0.45rem,1.5vw,0.7rem);text-decoration:none}
.h-logo img{height:clamp(26px,4.5vh,34px);width:auto;filter:drop-shadow(0 0 8px rgba(0,240,255,0.4))}
.h-logo-fb{display:none;width:clamp(26px,4.5vh,34px);height:clamp(26px,4.5vh,34px);align-items:center;justify-content:center}
.h-title{font-family:'Orbitron',sans-serif;font-size:clamp(0.55rem,1.6vw,0.72rem);font-weight:700;letter-spacing:0.18em;color:var(--c);text-transform:uppercase;white-space:nowrap}

.ov{
  position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .3s;
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
}
.ov.open{opacity:1;pointer-events:all}

.sidebar{
  position:fixed;top:0;left:0;
  width:clamp(240px,75vw,272px);height:100%;height:100dvh;
  z-index:201;
  background:rgba(4,4,4,0.97);border-right:1px solid var(--b);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  transform:translateX(-105%);
  transition:transform .38s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top,0);
}
.sidebar.open{transform:translateX(0)}
.sb-head{display:flex;align-items:center;gap:0.65rem;padding:1rem 1.1rem;border-bottom:1px solid var(--b)}
.sb-head img{height:28px;filter:drop-shadow(0 0 6px rgba(0,240,255,0.35))}
.sb-head-fb{display:none;width:28px;height:28px;align-items:center;justify-content:center}
.sb-head span{font-family:'Orbitron',sans-serif;font-size:0.6rem;letter-spacing:0.14em;color:var(--c)}
.sb-nav{flex:1;display:flex;flex-direction:column;padding:0.75rem 0.65rem;gap:0.2rem;overflow-y:auto}
.nav-item{
  display:flex;align-items:center;gap:0.7rem;
  padding:0.7rem 0.85rem;border-radius:8px;border:1px solid transparent;
  color:var(--muted);font-size:0.92rem;font-weight:600;letter-spacing:0.03em;
  cursor:pointer;text-decoration:none;
  transition:all .22s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.nav-item:hover,.nav-item:focus-visible{background:rgba(0,240,255,0.05);border-color:var(--b);color:var(--c);outline:none}
.nav-item svg{flex-shrink:0;width:16px;height:16px}
.sb-footer{padding:0.75rem 0.65rem;padding-bottom:max(env(safe-area-inset-bottom),0.75rem);border-top:1px solid var(--b)}

main{
  position:relative;z-index:1;
  max-width:900px;margin:0 auto;
  padding:clamp(1.5rem,4vh,2.5rem) clamp(0.9rem,3vw,1.4rem) clamp(3rem,8vh,5rem);
}
.section-label{
  font-family:'Orbitron',sans-serif;font-size:0.58rem;
  letter-spacing:0.32em;color:rgba(0,240,255,0.35);text-transform:uppercase;
  margin-bottom:clamp(1rem,3vh,1.4rem);
}

.boxes-row{
  display:grid;grid-template-columns:1fr 1fr;
  gap:clamp(0.7rem,2.5vw,1.1rem);
  margin-bottom:clamp(1.5rem,4vh,2.5rem);
}

.hub-card{
  position:relative;background:var(--card);
  border:1px solid var(--b);border-radius:11px;
  overflow:visible;cursor:pointer;
  transition:border-color .28s,transform .22s,box-shadow .28s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.hub-card .cr{
  position:absolute;border-color:rgba(0,240,255,0.4);border-style:solid;
  pointer-events:none;z-index:2;
  transition:width .28s,height .28s,border-color .28s;
}
.hub-card .cr.tl{top:-1px;left:-1px;width:11px;height:11px;border-width:2px 0 0 2px;border-radius:3px 0 0 0}
.hub-card .cr.tr{top:-1px;right:-1px;width:11px;height:11px;border-width:2px 2px 0 0;border-radius:0 3px 0 0}
.hub-card .cr.bl{bottom:-1px;left:-1px;width:11px;height:11px;border-width:0 0 2px 2px;border-radius:0 0 0 3px}
.hub-card .cr.br{bottom:-1px;right:-1px;width:11px;height:11px;border-width:0 2px 2px 0;border-radius:0 0 3px 0}
.hub-card:hover{border-color:rgba(0,240,255,0.26);transform:translateY(-3px);box-shadow:0 10px 40px rgba(0,240,255,0.08)}
.hub-card:hover .cr{width:18px;height:18px;border-color:var(--c)}
.hub-card:active{transform:translateY(-1px) scale(.985)}

.card-inner{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(0.55rem,2vh,0.85rem);
  padding:clamp(1.4rem,4vh,2.2rem) clamp(0.8rem,2.5vw,1.2rem);
  text-align:center;overflow:hidden;border-radius:11px;
}
.card-icon{
  width:clamp(42px,7vw,54px);height:clamp(42px,7vw,54px);
  display:flex;align-items:center;justify-content:center;
  border-radius:11px;border:1px solid rgba(0,240,255,0.14);
  background:rgba(0,240,255,0.04);flex-shrink:0;
  transition:background .25s,border-color .25s,box-shadow .25s;
}
.hub-card:hover .card-icon{background:rgba(0,240,255,0.09);border-color:rgba(0,240,255,0.32);box-shadow:0 0 16px rgba(0,240,255,0.1)}
.card-icon.purple{border-color:rgba(168,85,247,0.14);background:rgba(168,85,247,0.04)}
.hub-card:hover .card-icon.purple{background:rgba(168,85,247,0.09);border-color:rgba(168,85,247,0.32);box-shadow:0 0 16px rgba(168,85,247,0.1)}
.card-icon svg{width:clamp(18px,3.5vw,23px);height:clamp(18px,3.5vw,23px)}
.card-title{font-family:'Orbitron',sans-serif;font-size:clamp(0.58rem,1.6vw,0.7rem);font-weight:700;letter-spacing:0.1em;color:var(--text);line-height:1.3}
.card-sub{font-size:clamp(0.72rem,1.8vw,0.82rem);color:var(--muted);line-height:1.3}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;
  display:flex;align-items:flex-end;justify-content:center;
  padding:0;opacity:0;pointer-events:none;
  transition:opacity .28s;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.modal-overlay.open{opacity:1;pointer-events:all}
@media(min-width:560px){.modal-overlay{align-items:center;padding:1rem}}

.modal{
  position:relative;background:#060606;
  border:1px solid var(--b);border-radius:16px 16px 0 0;
  width:100%;max-width:520px;
  max-height:90dvh;max-height:90vh;
  display:flex;flex-direction:column;
  transform:translateY(50px);
  transition:transform .35s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.modal-overlay.open .modal{transform:translateY(0)}
@media(min-width:560px){
  .modal{border-radius:16px;max-height:84vh;transform:scale(.93) translateY(14px)}
  .modal-overlay.open .modal{transform:scale(1) translateY(0)}
}
.modal .mc{
  position:absolute;border-color:rgba(0,240,255,0.5);border-style:solid;
  pointer-events:none;z-index:2;width:13px;height:13px;
}
.modal .mc.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:4px 0 0 0}
.modal .mc.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;border-radius:0 4px 0 0}
.modal .mc.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;border-radius:0 0 0 4px}
.modal .mc.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-radius:0 0 4px 0}

.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:clamp(0.85rem,2.5vh,1.1rem) clamp(1rem,3vw,1.3rem);
  border-bottom:1px solid var(--b);flex-shrink:0;
  background:rgba(0,240,255,0.02);
}
.modal-h-left{display:flex;align-items:center;gap:0.55rem}
.modal-title{font-family:'Orbitron',sans-serif;font-size:clamp(0.62rem,1.8vw,0.72rem);font-weight:700;letter-spacing:0.12em;color:var(--c)}
.modal-close{
  background:transparent;border:1px solid var(--b);border-radius:6px;
  color:var(--muted);width:30px;height:30px;min-width:30px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.modal-close:hover,.modal-close:active{border-color:var(--c);color:var(--c)}
.modal-close svg{width:11px;height:11px}

.modal-body{
  padding:clamp(0.9rem,2.5vh,1.2rem) clamp(1rem,3vw,1.3rem);
  overflow-y:auto;flex:1;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:rgba(0,240,255,0.15) transparent;
}
.modal-body::-webkit-scrollbar{width:3px}
.modal-body::-webkit-scrollbar-thumb{background:rgba(0,240,255,0.15);border-radius:2px}

.games-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(0.7rem,2.5vw,1rem)}

.game-card{
  position:relative;
  background:var(--card2);
  border:1px solid var(--b);
  border-radius:10px;
  overflow:hidden;
  display:flex;flex-direction:column;
  transition:border-color .25s,transform .22s,box-shadow .25s;
  -webkit-tap-highlight-color:transparent;
}
.game-card:hover{border-color:rgba(0,240,255,0.28);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,240,255,0.08)}

.game-header{
  padding:clamp(0.45rem,1.5vh,0.6rem) clamp(0.6rem,2vw,0.8rem);
  background:rgba(0,240,255,0.04);
  border-bottom:1px solid var(--b);
  font-family:'Orbitron',sans-serif;
  font-size:clamp(0.48rem,1.2vw,0.56rem);
  font-weight:700;letter-spacing:0.1em;
  color:rgba(0,240,255,0.6);text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.game-logo-wrap{
  position:relative;overflow:hidden;
  background:#000;
}
.game-logo-wrap img{
  width:100%;aspect-ratio:16/9;object-fit:cover;display:block;
  transition:transform .4s cubic-bezier(.22,1,.36,1);
}
.game-card:hover .game-logo-wrap img{transform:scale(1.04)}

.game-logo-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.7));
  pointer-events:none;
}

.game-body{
  padding:clamp(0.5rem,1.5vh,0.7rem) clamp(0.6rem,2vw,0.8rem);
  display:flex;align-items:center;justify-content:space-between;gap:0.5rem;
  flex:1;
}
.game-name{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(0.52rem,1.3vw,0.62rem);
  font-weight:700;letter-spacing:0.06em;
  color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;
}
.play-btn{
  display:flex;align-items:center;justify-content:center;
  width:clamp(26px,4.5vw,32px);height:clamp(26px,4.5vw,32px);
  min-width:clamp(26px,4.5vw,32px);
  background:rgba(0,240,255,0.07);
  border:1px solid rgba(0,240,255,0.22);
  border-radius:7px;
  color:var(--c);
  text-decoration:none;
  transition:all .22s;
  flex-shrink:0;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.play-btn:hover,.play-btn:active{background:rgba(0,240,255,0.18);border-color:var(--c);box-shadow:0 0 14px rgba(0,240,255,0.2)}
.play-btn svg{width:clamp(11px,2vw,14px);height:clamp(11px,2vw,14px)}

.code-block{
  background:#000;border:1px solid rgba(0,240,255,0.1);border-radius:8px;
  padding:clamp(0.85rem,2.5vh,1.1rem);
  font-family:'Courier New',Courier,monospace;
  font-size:clamp(0.72rem,1.8vw,0.82rem);color:#7ef5f5;
  word-break:break-all;line-height:1.7;
}
.copy-btn{
  display:inline-flex;align-items:center;gap:0.45rem;margin-top:0.9rem;
  padding:0.55rem 1.2rem;
  background:rgba(0,240,255,0.06);border:1px solid rgba(0,240,255,0.22);border-radius:8px;
  color:var(--c);font-family:'Orbitron',sans-serif;
  font-size:clamp(0.58rem,1.6vw,0.65rem);letter-spacing:0.1em;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.copy-btn:hover,.copy-btn:active{background:rgba(0,240,255,0.12);border-color:var(--c)}
.copy-btn.copied{border-color:var(--g);color:var(--g);background:rgba(0,255,136,0.07)}
.copy-btn svg{width:12px;height:12px;flex-shrink:0}

.share-row{display:flex;gap:0.5rem;align-items:center}
.share-input{
  flex:1;background:#000;border:1px solid var(--b);border-radius:7px;
  padding:0.55rem 0.8rem;color:var(--muted);
  font-family:'Exo 2',sans-serif;font-size:clamp(0.75rem,2vw,0.85rem);
  outline:none;min-width:0;
}

.animate-in{animation:fadeUp .55s cubic-bezier(.22,1,.36,1) both}
.d1{animation-delay:.09s}.d2{animation-delay:.18s}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:380px){.card-title{font-size:0.52rem;letter-spacing:0.05em}.boxes-row{gap:0.55rem}}
@media(hover:none) and (pointer:coarse){
  .hub-card:hover{transform:none;box-shadow:none;border-color:var(--b)}
  .hub-card:hover .cr{width:11px;height:11px;border-color:rgba(0,240,255,0.4)}
  .hub-card:active{transform:scale(.97);border-color:rgba(0,240,255,0.26)}
  .hub-card:active .cr{width:18px;height:18px;border-color:var(--c)}
  .game-card:hover{transform:none;box-shadow:none}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="ov" id="ov" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sb">
  <div class="sb-head">
    <img src="Nex.png" alt="logo" id="sbLogo"
      onerror="this.style.display='none';document.getElementById('sbLF').style.display='flex'">
    <div class="sb-head-fb" id="sbLF">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00f0ff" stroke-width="1.5"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/></svg>
    </div>
    <span>Nexxto</span>
  </div>
  <nav class="sb-nav">
    <a class="nav-item" href="#" onclick="openModal('gamesM');closeSidebar();return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59 27.9 27.9 0 0 0 0 6.82A4 4 0 0 0 6.68 19h10.64a4 4 0 0 0 3.978-3.59 27.9 27.9 0 0 0 0-6.82A4 4 0 0 0 17.32 5z"/>
        <line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/>
        <circle cx="15" cy="12" r=".5" fill="currentColor"/><circle cx="18" cy="10" r=".5" fill="currentColor"/><circle cx="18" cy="14" r=".5" fill="currentColor"/>
      </svg>
      Supported Games
    </a>
    <a class="nav-item" href="#" onclick="openModal('shareM');closeSidebar();return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
      Share Page
    </a>
    <a class="nav-item" href="https://discord.gg/GtbrFrcU5z" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>
      Discord
    </a>
  </nav>
</aside>

<header>
  <div class="h-left">
    <button class="menu-btn" id="mb" onclick="toggleSidebar()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="h-logo">
      <img src="Nex.png" alt="Nexxto" id="hLogo"
        onerror="this.style.display='none';document.getElementById('hLF').style.display='flex'">
      <div class="h-logo-fb" id="hLF">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00f0ff" stroke-width="1.5"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/></svg>
      </div>
      <span class="h-title">Nexxto</span>
    </a>
  </div>
</header>

<main>
  <p class="section-label animate-in">Hub Dashboard</p>
  <div class="boxes-row animate-in d1">
    <div class="hub-card" onclick="openModal('loaderM')">
      <div class="cr tl"></div><div class="cr tr"></div><div class="cr bl"></div><div class="cr br"></div>
      <div class="card-inner">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<script>
(function(){
  var cv=document.getElementById('c'),cx=cv.getContext('2d');
  var W,H,pts=[];
  var dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    cv.width=W*dpr;cv.height=H*dpr;
    cv.style.width=W+'px';cv.style.height=H+'px';
    cx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();window.addEventListener('resize',resize);
  function Pt(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-.5)*.26;this.vy=(Math.random()-.5)*.16;
    this.r=Math.random()*1.5+.3;this.a=Math.random()*.45+.08;
    this.t=Math.random()*Math.PI*2;this.col=Math.floor(Math.random()*3);
  }
  for(var i=0;i<45;i++)pts.push(new Pt());
  var COLS=['#00f0ff','#a855f7','#00ff88'],scanT=0;
  function frame(){
    cx.clearRect(0,0,W,H);scanT+=.0022;
    cx.strokeStyle='rgba(0,240,255,0.027)';cx.lineWidth=.7;
    for(var x=0;x<W;x+=52){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(var y=0;y<H;y+=52){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    var sy=(scanT%1)*H;
    var sg=cx.createLinearGradient(0,sy-70,0,sy+70);
    sg.addColorStop(0,'rgba(0,240,255,0)');sg.addColorStop(.5,'rgba(0,240,255,0.02)');sg.addColorStop(1,'rgba(0,240,255,0)');
    cx.fillStyle=sg;cx.fillRect(0,sy-70,W,140);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      p.x+=p.vx;p.y+=p.vy;p.t+=.015;
      if(p.x<-5)p.x=W+5;if(p.x>W+5)p.x=-5;
      if(p.y<-5)p.y=H+5;if(p.y>H+5)p.y=-5;
      for(var j=i+1;j<pts.length;j++){
        var q=pts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<100){cx.globalAlpha=(1-d/100)*.09;cx.strokeStyle='#00f0ff';cx.lineWidth=.4;cx.beginPath();cx.moveTo(p.x,p.y);cx.lineTo(q.x,q.y);cx.stroke();}
      }
      var pulse=.5+.5*Math.sin(p.t);
      cx.globalAlpha=p.a*pulse;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=COLS[p.col];cx.fill();
    }
    cx.globalAlpha=1;requestAnimationFrame(frame);
  }
  frame();
})();

function toggleSidebar(){
  var open=document.getElementById('sb').classList.toggle('open');
  document.getElementById('ov').classList.toggle('open',open);
  document.getElementById('mb').classList.toggle('open',open);
  document.body.style.overflow=open?'hidden':'';
}
function closeSidebar(){
  document.getElementById('sb').classList.remove('open');
  document.getElementById('ov').classList.remove('open');
  document.getElementById('mb').classList.remove('open');
  document.body.style.overflow='';
}
function openModal(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden'}
function closeModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow=''}
document.querySelectorAll('.modal-overlay').forEach(function(el){
  el.addEventListener('click',function(e){if(e.target===el)closeModal(el.id);});
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    document.querySelectorAll('.modal-overlay.open').forEach(function(el){closeModal(el.id);});
    closeSidebar();
  }
});

(function buildGames(){
  var grid=document.getElementById('gamesGrid');
  var label=document.getElementById('gcLabel');
  if(!grid||typeof GAMES==='undefined')return;
  GAMES.forEach(function(g,i){
    var card=document.createElement('div');
    card.className='game-card';
    card.style.animationDelay=(i*0.07)+'s';

    var hdr=document.createElement('div');
    hdr.className='game-header';
    hdr.textContent='Supported Game';

    var imgWrap=document.createElement('div');
    imgWrap.className='game-logo-wrap';
    var img=document.createElement('img');
    img.src=g.gamelogo;img.alt=g.gamename;img.loading='lazy';
    img.onerror=function(){imgWrap.style.background='rgba(0,240,255,0.03)';imgWrap.style.minHeight='60px';};
    imgWrap.appendChild(img);

    var body=document.createElement('div');
    body.className='game-body';
    var name=document.createElement('div');
    name.className='game-name';name.textContent=g.gamename;

    var playBtn=document.createElement('a');
    playBtn.className='play-btn';
    playBtn.href=g.gamelink;playBtn.target='_blank';playBtn.rel='noopener noreferrer';
    playBtn.setAttribute('aria-label','Play '+g.gamename);
    playBtn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/></svg>';

    body.appendChild(name);body.appendChild(playBtn);
    card.appendChild(hdr);card.appendChild(imgWrap);card.appendChild(body);
    grid.appendChild(card);
  });
  if(label)label.textContent=GAMES.length+' game'+(GAMES.length!==1?'s':'')+' supported';
})();

var SCRIPT_TEXT='— loader content not set —';
document.getElementById('codeBlock').textContent=SCRIPT_TEXT;
function copyScript(){
  var btn=document.getElementById('copyBtn');
  function done(){
    btn.classList.add('copied');
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
    setTimeout(function(){
      btn.classList.remove('copied');
      btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
    },2200);
  }
  navigator.clipboard?navigator.clipboard.writeText(SCRIPT_TEXT).then(done).catch(function(){fallbackCopy(SCRIPT_TEXT,done);}):fallbackCopy(SCRIPT_TEXT,done);
}
function fallbackCopy(text,cb){
  var t=document.createElement('textarea');t.value=text;
  document.body.appendChild(t);t.select();document.execCommand('copy');
  document.body.removeChild(t);if(cb)cb();
}
document.getElementById('shareInput').value=window.location.href;
function copyShare(){
  var btn=document.getElementById('shareBtn'),url=window.location.href;
  function done(){btn.classList.add('copied');btn.textContent='Copied!';setTimeout(function(){btn.classList.remove('copied');btn.textContent='Copy';},2200);}
  navigator.clipboard?navigator.clipboard.writeText(url).then(done).catch(function(){fallbackCopy(url,done);}):fallbackCopy(url,done);
}
</script>
